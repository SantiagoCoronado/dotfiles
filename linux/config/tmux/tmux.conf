# Inspired by https://github.com/omerxx/dotfiles/tree/master/tmux with local tweaks
source-file ~/.config/tmux/tmux.reset.conf

# Core behaviour
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set-option -g default-terminal 'tmux-256color'
set-option -ga terminal-overrides ',xterm-256color:RGB'
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set -g status-left-length 60
set -g status-right-length 120
set -g status-interval 5

# Additional navigation helpers
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Plugin configuration
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'TanglingTreats/tmux-everforest'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'laktak/extrakto'

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# Extrakto - fuzzy find text from scrollback
set -g @extrakto_key 'Tab'
set -g @extrakto_split_size '12'
set -g @extrakto_clip_tool 'xclip -selection clipboard'
set -g @extrakto_fzf_tool 'fzf'
set -g @extrakto_popup_size '60%'

set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '~/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @tmux-everforest 'dark-medium'
set -g @tmux-everforest-window-left-separator ""
set -g @tmux-everforest-window-right-separator " "
set -g @tmux-everforest-window-middle-separator " █"
set -g @tmux-everforest-window-number-position "right"
set -g @tmux-everforest-window-default-fill "number"
set -g @tmux-everforest-window-default-text "#W"
set -g @tmux-everforest-window-current-fill "number"
set -g @tmux-everforest-window-current-text "#W#{?window_zoomed_flag,(),}"
set -g @tmux-everforest-status-modules-right "directory date_time"
set -g @tmux-everforest-status-modules-left "session"
set -g @tmux-everforest-status-left-separator " "
set -g @tmux-everforest-status-right-separator " "
set -g @tmux-everforest-status-right-separator-inverse "no"
set -g @tmux-everforest-status-fill "icon"
set -g @tmux-everforest-status-connect-separator "no"
set -g @tmux-everforest-directory-text "#{b:pane_current_path}"
set -g @tmux-everforest-date-time-text "%H:%M"

run '~/.tmux/plugins/tpm/tpm'
